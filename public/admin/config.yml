backend:
  name: git-gateway
  branch: main

# For local development, uncomment this and comment out git-gateway above:
# backend:
#   name: proxy
#   proxy_url: http://localhost:8081/api/v1

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# i18n configuration
i18n:
  structure: multiple_folders
  locales: [pt, en]
  default_locale: pt

collections:
  # ─────────────────────────────────────────
  # PROJECTS (Properties / Empreendimentos)
  # ─────────────────────────────────────────
  - name: "projects"
    label: "Projects / Projetos"
    label_singular: "Project / Projeto"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    i18n: true
    fields:
      - { label: "Title / Título", name: "title", widget: "string", i18n: true }
      - { label: "Location / Localização", name: "location", widget: "string", i18n: true }
      - { label: "Type / Tipo", name: "type", widget: "string", i18n: true }
      - { label: "Total Units / Total de Frações", name: "totalUnits", widget: "number", i18n: duplicate }
      - { label: "Area Range / Gama de Áreas", name: "area", widget: "string", i18n: duplicate }
      - label: "Status"
        name: "status"
        widget: "select"
        i18n: duplicate
        options:
          - { label: "Completed / Concluído", value: "completed" }
          - { label: "Under Construction / Em Construção", value: "under_construction" }
          - { label: "Coming Soon / Brevemente", value: "coming_soon" }
      - { label: "Year / Ano", name: "year", widget: "string", i18n: duplicate }
      - { label: "Description / Descrição", name: "description", widget: "text", i18n: true }
      - { label: "Featured Image / Imagem Destaque", name: "image", widget: "image", i18n: duplicate }
      - { label: "Gallery / Galeria", name: "gallery", widget: "list", required: false, i18n: duplicate, field: { label: "Image", name: "image", widget: "image" } }
      - { label: "Featured / Destaque", name: "featured", widget: "boolean", default: false, i18n: duplicate }
      - { label: "Order / Ordem", name: "order", widget: "number", default: 0, i18n: duplicate }
      - label: "Units / Frações"
        name: "units"
        widget: "list"
        required: false
        i18n: true
        fields:
          - { label: "ID / Identificador", name: "id", widget: "string", hint: "Unique slug, e.g. t2-a, t3-penthouse" }
          - { label: "Typology / Tipologia", name: "typology", widget: "string", hint: "e.g. T1, T2, T3" }
          - { label: "Area (m²) / Área (m²)", name: "area", widget: "string", hint: "e.g. 85 m²" }
          - { label: "Bedrooms / Quartos", name: "bedrooms", widget: "number" }
          - { label: "Bathrooms / Casas de Banho", name: "bathrooms", widget: "number" }
          - { label: "Floor / Andar", name: "floor", widget: "string", hint: "e.g. 3, Ground, Penthouse" }
          - { label: "Orientation / Orientação", name: "orientation", widget: "string", required: false, hint: "e.g. South, South-West" }
          - { label: "Description / Descrição", name: "description", widget: "text", required: false }
          - label: "Features / Características"
            name: "features"
            widget: "list"
            required: false
            field: { label: "Feature", name: "feature", widget: "string" }
          - { label: "Floor Plan / Planta", name: "floorPlan", widget: "image", required: false }
          - label: "Photos / Fotografias"
            name: "photos"
            widget: "list"
            required: false
            field: { label: "Photo", name: "photo", widget: "image" }

  # ─────────────────────────────────────────
  # SERVICES
  # ─────────────────────────────────────────
  - name: "services"
    label: "Services / Serviços"
    label_singular: "Service / Serviço"
    folder: "src/content/services"
    create: true
    slug: "{{slug}}"
    i18n: true
    fields:
      - { label: "Title / Título", name: "title", widget: "string", i18n: true }
      - { label: "Description / Descrição", name: "description", widget: "text", i18n: true }
      - label: "Features / Características"
        name: "features"
        widget: "list"
        i18n: true
        field: { label: "Feature", name: "feature", widget: "string" }
      - { label: "Order / Ordem", name: "order", widget: "number", default: 0, i18n: duplicate }

  # ─────────────────────────────────────────
  # SITE SETTINGS
  # ─────────────────────────────────────────
  - name: "settings"
    label: "Site Settings / Configurações"
    files:
      - label: "Company Info / Informação da Empresa"
        name: "company"
        file: "src/content/settings/company.json"
        fields:
          - { label: "Company Name / Nome da Empresa", name: "name", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Phone / Telefone", name: "phone", widget: "string" }
          - { label: "Address / Morada", name: "address", widget: "string" }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }

      - label: "Homepage / Página Inicial"
        name: "homepage"
        file: "src/content/settings/homepage.json"
        fields:
          - { label: "Hero Image / Imagem Hero", name: "heroImage", widget: "image" }
          - { label: "Hero Title (EN)", name: "heroTitleEn", widget: "string" }
          - { label: "Hero Title (PT)", name: "heroTitlePt", widget: "string" }
          - { label: "Hero Description (EN)", name: "heroDescEn", widget: "text" }
          - { label: "Hero Description (PT)", name: "heroDescPt", widget: "text" }
          - { label: "About Image 1", name: "aboutImage1", widget: "image" }
          - { label: "About Image 2", name: "aboutImage2", widget: "image" }
